    :root {

      --caramel: #B85C38;

      --beige: #EADBC8;
      --dark-choco: #3D2416; 
      --light-caramel: #E8906A; 
      --warm-white: #FFFDF9;
      --text-dark: #2C1810; 
      --text-mid: #6B4226; 
      --text-light: #9E7A5A;
      --success: #2D7A3A; 
      --danger: #C0392B;
      --shadow-warm: rgba(92, 61, 46, 0.15); 
      --shadow-deep: rgba(92, 61, 46, 0.25);
      --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --cream: #1A0F0A; 
      --beige: #2A1810; 
      --warm-white: #1A0F0A;
      --text-dark: #F5E6D3; 
      --text-mid: #D4A98A; 
      --text-light: #9E7A5A;
      --shadow-warm: rgba(0, 0, 0, 0.3); 
      --shadow-deep: rgba(0, 0, 0, 0.5);
      --choco: #C8956A; 
      --caramel: #E8906A; 
      --dark-choco: #F0C8A0;
    }

    *, *::before, *:
    :after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── LOADING SCREEN ── */
    #loader {
      position: fixed; inset: 0; background: var(--choco);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }
    .loader-cookie {
      width: 80px; height: 80px; background: var(--caramel); border-radius: 50%;
      animation: cookieSpin 1.5s ease-in-out infinite;
    }
    .loader-text {
      color: var(--cream); font-family: 'Dancing Script', cursive;
      font-size: 2rem; margin-top: 1rem; animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes cookieSpin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1); }
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
